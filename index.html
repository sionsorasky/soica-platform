<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <!-- ファビコン -->
    <link rel="icon" href="favicon.ico">
    <!-- アップルタッチアイコン -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <title>Soica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #f2f2f7;
            --bg-secondary: #ffffff;
            --text-primary: #000000;
            --text-secondary: #3c3c43;
            --text-tertiary: #8e8e93;
            --separator: #c6c6c8;
            --system-blue: #007aff;
            --system-red: #ff3b30;
            --card-radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.47;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding-bottom: 84px;
        }

        .header {
            background-color: var(--bg-secondary);
            padding: 16px 20px;
            border-bottom: 0.5px solid var(--separator);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .screen {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding: 0 16px;
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .input-container {
            background-color: var(--bg-secondary);
            border-radius: var(--card-radius);
            padding: 12px 16px;
            flex: 1;
        }

        input[type="text"], input[type="url"] {
            width: 100%;
            border: none;
            font-size: 17px;
            background: transparent;
            color: var(--text-primary);
            outline: none;
            font-family: inherit;
        }

        input::placeholder {
            color: var(--text-tertiary);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--card-radius);
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--system-blue);
            color: white;
            font-family: inherit;
            white-space: nowrap;
        }

        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-full {
            width: 100%;
            padding: 16px;
        }

        .btn-secondary {
            background-color: var(--bg-secondary);
            color: var(--system-blue);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 15px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .card {
            position: relative;
            border-radius: var(--card-radius);
            overflow: hidden;
            aspect-ratio: 1.6;
            cursor: pointer;
            transition: transform 0.2s;
            background-color: #e5e5ea;
        }

        .card:active {
            transform: scale(0.96);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card-overlay.visible {
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(249, 249, 249, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--separator);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 20px 0;
            z-index: 1000;
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-family: inherit;
        }

        .tab-item.active {
            color: var(--system-blue);
        }

        .tab-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-icon svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .tab-label {
            font-size: 10px;
            font-weight: 500;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 0.5px solid var(--separator);
            font-size: 17px;
            font-weight: 600;
            text-align: center;
        }

        .modal-body {
            padding: 20px;
        }

        .card-detail-view {
            display: none;
            padding: 20px;
            animation: slideInRight 0.3s ease;
        }

        .card-detail-view.active {
            display: block;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }

        .back-button {
            background: none;
            border: none;
            color: var(--system-blue);
            font-size: 17px;
            cursor: pointer;
            padding: 8px 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: inherit;
        }

        .card-detail-container {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .card-detail-image-wrapper {
            flex: 0 0 auto;
        }

        .card-detail-image {
            width: 100%;
            border-radius: var(--card-radius);
            aspect-ratio: 1.6;
            object-fit: cover;
        }

        .card-detail-info-wrapper {
            flex: 1;
            min-width: 0;
        }

        .card-detail-info {
            margin-bottom: 24px;
        }

        .card-detail-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-detail-url {
            font-size: 13px;
            color: var(--text-tertiary);
            word-break: break-all;
            line-height: 1.4;
        }

        .balance-result {
            background-color: var(--bg-secondary);
            border-radius: var(--card-radius);
            padding: 20px;
            margin-top: 16px;
            text-align: center;
        }

        .balance-label {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }

        .balance-value {
            font-size: 34px;
            font-weight: 700;
        }

        .balance-error {
            color: var(--system-red);
        }

        .official-card-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            background-color: var(--bg-secondary);
            border-radius: var(--card-radius);
            margin-bottom: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .official-card-item:active {
            background-color: var(--bg-primary);
        }

        .official-card-item img {
            width: 60px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
        }

        .official-card-name {
            font-size: 17px;
            font-weight: 500;
        }

        .card-edit-mode {
            cursor: move;
        }

        .card-edit-mode.dragging {
            opacity: 0.5;
        }

        .card-edit-mode.drag-over {
            border: 2px dashed var(--system-blue);
        }

        .card-delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: var(--system-red);
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: transform 0.2s;
            line-height: 1;
        }

        .card-delete-btn:active {
            transform: scale(0.9);
        }

        .action-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 3000;
            display: none;
            align-items: flex-end;
            justify-content: center;
            padding: 8px;
            animation: fadeIn 0.2s;
        }

        .action-sheet.active {
            display: flex;
        }

        .action-sheet-content {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            animation: slideUp 0.3s ease;
            margin-bottom: 8px;
        }

        .action-sheet-item {
            padding: 16px;
            text-align: center;
            font-size: 17px;
            cursor: pointer;
            border-bottom: 0.5px solid var(--separator);
            transition: background-color 0.2s;
        }

        .action-sheet-item:active {
            background-color: var(--bg-primary);
        }

        .action-sheet-item:last-child {
            border-bottom: none;
        }

        .action-sheet-item.destructive {
            color: var(--system-red);
            font-weight: 600;
        }

        .action-sheet-item.cancel {
            font-weight: 600;
            color: var(--system-blue);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 28px;
            }

            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .card-detail-name {
                font-size: 24px;
            }

            .balance-value {
                font-size: 28px;
            }

            .card-detail-container {
                flex-direction: column;
            }

            .card-detail-image {
                width: 100%;
            }
        }

        @media (min-width: 601px) {
            .card-detail-container {
                max-height: calc(100vh - 200px);
            }

            .card-detail-image {
                max-width: 320px;
                max-height: 200px;
                width: auto;
                height: auto;
            }

            .card-detail-name {
                font-size: 22px;
            }

            .balance-value {
                font-size: 24px;
            }
        }

        .touch-hint {
            font-size: 13px;
            color: var(--text-tertiary);
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>Soica</h1>
</div>

<!-- エクスプレス画面 -->
<div class="screen active" id="expressScreen">
    <div class="section">
        <div class="section-title">ユーザーID</div>
        <div class="input-row">
            <div class="input-container">
                <input type="text" id="expressUserId" placeholder="ユーザーIDを入力">
            </div>
            <button class="btn" onclick="updateExpressBalance()">確認</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">カード</div>
        <div id="expressCards" class="cards-grid">
            <div class="empty-state">
                <div class="empty-state-icon">💳</div>
                <p>カードが登録されていません</p>
            </div>
        </div>
    </div>
</div>

<!-- 標準画面 -->
<div class="screen" id="standardScreen">
    <div class="section">
        <div class="section-title">カードを選択</div>
        <div id="standardCards" class="cards-grid">
            <div class="empty-state">
                <div class="empty-state-icon">💳</div>
                <p>カードが登録されていません</p>
            </div>
        </div>
    </div>
</div>

<!-- カード詳細画面 -->
<div class="card-detail-view" id="cardDetailView">
    <button class="back-button" onclick="closeCardDetail()">← 戻る</button>
    <div class="card-detail-container">
        <div class="card-detail-image-wrapper">
            <img id="detailImage" class="card-detail-image" src="" alt="">
        </div>
        <div class="card-detail-info-wrapper">
            <div class="card-detail-info">
                <div id="detailName" class="card-detail-name"></div>
                <div id="detailUrl" class="card-detail-url"></div>
            </div>
            <div class="section">
                <div class="section-title">ユーザーID</div>
                <div class="input-container">
                    <input type="text" id="detailUserId" placeholder="ユーザーIDを入力">
                </div>
                <button class="btn btn-full" style="margin-top: 12px;" onclick="checkDetailBalance()">残高を確認</button>
                <div id="detailBalanceResult"></div>
            </div>
        </div>
    </div>
</div>

<!-- 設定画面 -->
<div class="screen" id="settingsScreen">
    <div class="section">
        <button class="btn btn-full btn-secondary" onclick="showOfficialCards()">公式カードリスト</button>
    </div>

    <div class="section">
        <div class="section-title">カードを追加</div>
        <div class="input-container">
            <input type="url" id="jsonUrl" placeholder="JSON URLを入力">
        </div>
        <button class="btn btn-full" style="margin-top: 12px;" onclick="addCardFromUrl()">確認</button>
    </div>

    <div class="section">
        <div class="section-title">カード一覧</div>
        <div id="settingsCards" class="cards-grid">
            <div class="empty-state">
                <div class="empty-state-icon">💳</div>
                <p>カードが登録されていません</p>
            </div>
        </div>
        <div class="touch-hint">カードを長押ししてドラッグすると並び替えられます</div>
    </div>
</div>

<!-- タブバー -->
<div class="tab-bar">
    <button class="tab-item active" onclick="switchTab('express', this)">
        <div class="tab-icon">
            <svg viewBox="0 0 24 24"><path d="M13 3L4 14h7l-2 7 9-11h-7l2-7z"/></svg>
        </div>
        <div class="tab-label">エクスプレス</div>
    </button>
    <button class="tab-item" onclick="switchTab('standard', this)">
        <div class="tab-icon">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
        </div>
        <div class="tab-label">標準</div>
    </button>
    <button class="tab-item" onclick="switchTab('settings', this)">
        <div class="tab-icon">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </div>
        <div class="tab-label">設定</div>
    </button>
</div>

<!-- カード追加確認モーダル -->
<div class="modal" id="cardModal">
    <div class="modal-content">
        <div class="modal-header">カードを追加</div>
        <div class="modal-body">
            <div style="display: flex; gap: 16px; margin-bottom: 20px;">
                <img id="previewImage" src="" alt="" style="width: 100px; height: 60px; object-fit: cover; border-radius: 8px;">
                <div>
                    <div id="previewName" style="font-size: 17px; font-weight: 600; margin-bottom: 4px;"></div>
                    <div id="previewUrl" style="font-size: 13px; color: var(--text-tertiary); word-break: break-all;"></div>
                </div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-secondary" onclick="closeModal()" style="flex: 1;">キャンセル</button>
                <button class="btn" onclick="confirmAddCard()" style="flex: 1;">追加</button>
            </div>
        </div>
    </div>
</div>

<!-- 公式カードリストモーダル -->
<div class="modal" id="officialModal">
    <div class="modal-content">
        <div class="modal-header">公式カードリスト</div>
        <div class="modal-body" id="officialCardsList">
            <div class="empty-state">
                <p>読み込み中...</p>
            </div>
        </div>
        <div style="padding: 0 20px 20px;">
            <button class="btn btn-full btn-secondary" onclick="closeOfficialModal()">閉じる</button>
        </div>
    </div>
</div>

<!-- 削除確認アクションシート -->
<div class="action-sheet" id="deleteActionSheet">
    <div class="action-sheet-content">
        <div class="action-sheet-item destructive" id="deleteConfirmBtn">削除</div>
        <div class="action-sheet-item cancel" onclick="closeActionSheet()">キャンセル</div>
    </div>
</div>

<script>
    let cards = [];
    let currentCard = null;
    let draggedItem = null;
    let cardToDelete = null;

    // 初期化
    document.addEventListener('DOMContentLoaded', () => {
        loadCards();
        renderAllCards();
    });

    // LocalStorageからカードを読み込み
    function loadCards() {
        const saved = localStorage.getItem('soica_cards');
        if (saved) {
            cards = JSON.parse(saved);
        } else {
            cards = [];
        }
    }

    // LocalStorageにカードを保存
    function saveCards() {
        localStorage.setItem('soica_cards', JSON.stringify(cards));
    }

    // タブ切り替え
    function switchTab(tab, element) {
        document.querySelectorAll('.screen').forEach(screen => {
            screen.classList.remove('active');
        });
        document.querySelectorAll('.tab-item').forEach(item => {
            item.classList.remove('active');
        });

        document.getElementById(`${tab}Screen`).classList.add('active');
        if (element) {
            element.classList.add('active');
        }

        // カード詳細画面を閉じる
        document.getElementById('cardDetailView').classList.remove('active');
    }

    // JSON URLからカードを追加
    async function addCardFromUrl() {
        const url = document.getElementById('jsonUrl').value.trim();
        if (!url) {
            alert('JSON URLを入力してください');
            return;
        }

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('ネットワークエラー');

            const data = await response.json();
            showCardConfirmation(data, url);
        } catch (error) {
            alert('JSONの取得に失敗しました: ' + error.message);
        }
    }

    // カード確認モーダルを表示
    function showCardConfirmation(data, url) {
        document.getElementById('previewImage').src = data.imageURL || '';
        document.getElementById('previewName').textContent = data.card_name || '不明なカード';
        document.getElementById('previewUrl').textContent = data.gas_url || url;

        currentCard = { ...data, originalUrl: url };
        document.getElementById('cardModal').classList.add('active');
    }

    // モーダルを閉じる
    function closeModal() {
        document.getElementById('cardModal').classList.remove('active');
        currentCard = null;
    }

    // カードを追加
    function confirmAddCard() {
        if (currentCard) {
            cards.push(currentCard);
            saveCards();
            renderAllCards();
            closeModal();
            document.getElementById('jsonUrl').value = '';
        }
    }

    // 公式カードリストを表示
    async function showOfficialCards() {
        const modal = document.getElementById('officialModal');
        const list = document.getElementById('officialCardsList');
        modal.classList.add('active');

        try {
            const response = await fetch('https://json-soica.sionsky.jp/cards.json');
            const urls = await response.json();

            list.innerHTML = '';
            for (const url of urls) {
                try {
                    const cardResponse = await fetch(url);
                    const cardData = await cardResponse.json();

                    const item = document.createElement('div');
                    item.className = 'official-card-item';
                    item.innerHTML = `
                        <img src="${cardData.imageURL || ''}" alt="${cardData.card_name || ''}">
                        <div class="official-card-name">${cardData.card_name || '不明なカード'}</div>
                    `;
                    item.onclick = () => {
                        showCardConfirmation(cardData, url);
                        closeOfficialModal();
                    };
                    list.appendChild(item);
                } catch (error) {
                    console.error('カード読み込みエラー:', error);
                }
            }
        } catch (error) {
            list.innerHTML = '<div class="empty-state">読み込みに失敗しました</div>';
        }
    }

    // 公式カードリストモーダルを閉じる
    function closeOfficialModal() {
        document.getElementById('officialModal').classList.remove('active');
    }

    // すべてのカードを描画
    function renderAllCards() {
        renderExpressCards();
        renderStandardCards();
        renderSettingsCards();
    }

    // エクスプレスモードのカードを描画
    function renderExpressCards() {
        const container = document.getElementById('expressCards');

        if (cards.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">💳</div>
                    <p>カードが登録されていません</p>
                </div>
            `;
            return;
        }

        container.innerHTML = '';
        cards.forEach((card, index) => {
            const cardEl = document.createElement('div');
            cardEl.className = 'card';
            cardEl.innerHTML = `
                <img src="${card.imageURL || ''}" alt="${card.card_name || ''}">
                <div class="card-overlay" id="express-balance-${index}">-</div>
            `;
            container.appendChild(cardEl);
        });
    }

    // エクスプレスモードの残高を更新
    async function updateExpressBalance() {
        const userId = document.getElementById('expressUserId').value.trim();

        if (!userId) {
            alert('ユーザーIDを入力してください');
            return;
        }

        if (cards.length === 0) {
            alert('カードが登録されていません');
            return;
        }

        for (let i = 0; i < cards.length; i++) {
            const overlay = document.getElementById(`express-balance-${i}`);
            if (!overlay) continue;

            overlay.classList.add('visible');
            overlay.textContent = '...';

            try {
                const url = `${cards[i].gas_url}?b=${encodeURIComponent(userId)}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.result !== null && data.result !== undefined) {
                    overlay.textContent = data.result;
                } else {
                    overlay.textContent = 'N/A';
                }
            } catch (error) {
                overlay.textContent = 'Error';
            }
        }
    }

    // 標準モードのカードを描画
    function renderStandardCards() {
        const container = document.getElementById('standardCards');

        if (cards.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">💳</div>
                    <p>カードが登録されていません</p>
                </div>
            `;
            return;
        }

        container.innerHTML = '';
        cards.forEach((card, index) => {
            const cardEl = document.createElement('div');
            cardEl.className = 'card';
            cardEl.onclick = () => openCardDetail(index);
            cardEl.innerHTML = `
                <img src="${card.imageURL || ''}" alt="${card.card_name || ''}">
            `;
            container.appendChild(cardEl);
        });
    }

    // カード詳細画面を開く
    function openCardDetail(index) {
        const card = cards[index];
        document.getElementById('detailImage').src = card.imageURL || '';
        document.getElementById('detailName').textContent = card.card_name || '不明なカード';
        document.getElementById('detailUrl').textContent = card.gas_url || '';
        document.getElementById('detailUserId').value = '';
        document.getElementById('detailBalanceResult').innerHTML = '';

        document.getElementById('standardScreen').classList.remove('active');
        document.getElementById('cardDetailView').classList.add('active');
    }

    // カード詳細画面を閉じる
    function closeCardDetail() {
        document.getElementById('cardDetailView').classList.remove('active');
        document.getElementById('standardScreen').classList.add('active');
    }

    // 詳細画面で残高を確認
    async function checkDetailBalance() {
        const userId = document.getElementById('detailUserId').value.trim();
        const resultEl = document.getElementById('detailBalanceResult');

        if (!userId) {
            alert('ユーザーIDを入力してください');
            return;
        }

        const cardIndex = cards.findIndex(c => c.gas_url === document.getElementById('detailUrl').textContent);
        if (cardIndex === -1) return;

        const card = cards[cardIndex];
        resultEl.innerHTML = '<div class="balance-result"><div class="balance-label">確認中...</div></div>';

        try {
            const url = `${card.gas_url}?b=${encodeURIComponent(userId)}`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.result !== null && data.result !== undefined) {
                resultEl.innerHTML = `
                    <div class="balance-result">
                        <div class="balance-label">残高</div>
                        <div class="balance-value">${data.result}</div>
                    </div>
                `;
            } else {
                resultEl.innerHTML = `
                    <div class="balance-result balance-error">
                        <div class="balance-label">エラー</div>
                        <div class="balance-value" style="font-size: 17px;">残高が見つかりませんでした</div>
                    </div>
                `;
            }
        } catch (error) {
            resultEl.innerHTML = `
                <div class="balance-result balance-error">
                    <div class="balance-label">エラー</div>
                    <div class="balance-value" style="font-size: 17px;">${error.message}</div>
                </div>
            `;
        }
    }

    // 設定画面のカードを描画
    function renderSettingsCards() {
        const container = document.getElementById('settingsCards');

        if (cards.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">💳</div>
                    <p>カードが登録されていません</p>
                </div>
            `;
            return;
        }

        container.innerHTML = '';
        cards.forEach((card, index) => {
            const cardEl = document.createElement('div');
            cardEl.className = 'card card-edit-mode';
            cardEl.draggable = true;
            cardEl.dataset.index = index;
            cardEl.innerHTML = `
                <img src="${card.imageURL || ''}" alt="${card.card_name || ''}">
                <button class="card-delete-btn" onclick="event.stopPropagation(); showDeleteConfirm(${index})">−</button>
            `;

            // デスクトップ用ドラッグイベント
            cardEl.addEventListener('dragstart', handleDragStart);
            cardEl.addEventListener('dragend', handleDragEnd);
            cardEl.addEventListener('dragover', handleDragOver);
            cardEl.addEventListener('drop', handleDrop);
            cardEl.addEventListener('dragenter', handleDragEnter);
            cardEl.addEventListener('dragleave', handleDragLeave);

            // モバイル用タッチイベント
            cardEl.addEventListener('touchstart', handleTouchStart, {passive: false});
            cardEl.addEventListener('touchmove', handleTouchMove, {passive: false});
            cardEl.addEventListener('touchend', handleTouchEnd);

            container.appendChild(cardEl);
        });
    }

    // 削除確認を表示
    function showDeleteConfirm(index) {
        cardToDelete = index;
        document.getElementById('deleteActionSheet').classList.add('active');
    }

    // アクションシートを閉じる
    function closeActionSheet() {
        document.getElementById('deleteActionSheet').classList.remove('active');
        cardToDelete = null;
    }

    // 削除を実行
    document.getElementById('deleteConfirmBtn').addEventListener('click', () => {
        if (cardToDelete !== null) {
            cards.splice(cardToDelete, 1);
            saveCards();
            renderAllCards();
            closeActionSheet();
        }
    });

    // ドラッグ＆ドロップ handlers
    let touchStartY = 0;
    let touchItem = null;
    let touchOriginalIndex = null;

    function handleDragStart(e) {
        draggedItem = this;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragEnd(e) {
        this.classList.remove('dragging');
        document.querySelectorAll('.card-edit-mode').forEach(item => {
            item.classList.remove('drag-over');
        });
    }

    function handleDragOver(e) {
        if (e.preventDefault) e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        return false;
    }

    function handleDragEnter(e) {
        if (this !== draggedItem) {
            this.classList.add('drag-over');
        }
    }

    function handleDragLeave(e) {
        this.classList.remove('drag-over');
    }

    function handleDrop(e) {
        if (e.stopPropagation) e.stopPropagation();

        if (draggedItem !== this) {
            const fromIndex = parseInt(draggedItem.dataset.index);
            const toIndex = parseInt(this.dataset.index);

            const item = cards.splice(fromIndex, 1)[0];
            cards.splice(toIndex, 0, item);

            saveCards();
            renderSettingsCards();
        }

        return false;
    }

    function handleTouchStart(e) {
        touchItem = this;
        touchOriginalIndex = parseInt(this.dataset.index);
        touchStartY = e.touches[0].clientY;
        this.classList.add('dragging');
    }

    function handleTouchMove(e) {
        if (!touchItem) return;
        e.preventDefault();

        const touch = e.touches[0];
        const elementBelow = document.elementFromPoint(touch.clientX, touch.clientY);
        const cardItem = elementBelow ? elementBelow.closest('.card-edit-mode') : null;

        document.querySelectorAll('.card-edit-mode').forEach(item => {
            item.classList.remove('drag-over');
        });

        if (cardItem && cardItem !== touchItem) {
            cardItem.classList.add('drag-over');
        }
    }

    function handleTouchEnd(e) {
        if (!touchItem) return;

        const touch = e.changedTouches[0];
        const elementBelow = document.elementFromPoint(touch.clientX, touch.clientY);
        const cardItem = elementBelow ? elementBelow.closest('.card-edit-mode') : null;

        if (cardItem && cardItem !== touchItem) {
            const fromIndex = touchOriginalIndex;
            const toIndex = parseInt(cardItem.dataset.index);

            const item = cards.splice(fromIndex, 1)[0];
            cards.splice(toIndex, 0, item);

            saveCards();
            renderSettingsCards();
        }

        touchItem.classList.remove('dragging');
        document.querySelectorAll('.card-edit-mode').forEach(item => {
            item.classList.remove('drag-over');
        });

        touchItem = null;
        touchOriginalIndex = null;
    }

    // モーダル外クリックで閉じる
    document.querySelectorAll('.modal').forEach(modal => {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    });

    // アクションシート外クリックで閉じる
    document.getElementById('deleteActionSheet').addEventListener('click', (e) => {
        if (e.target.id === 'deleteActionSheet') {
            closeActionSheet();
        }
    });
</script>
</body>
</html>
